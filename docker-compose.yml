version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: survivor_league
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-survivor_league_prod_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: ./survivor-backend
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-survivor_league_prod_2024}@db:5432/survivor_league
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-prod_jwt_secret_2024_survivor_league}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-AdminPass2024!}
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./survivor-backend/uploads:/app/uploads

  frontend:
    build: ./survivor-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
